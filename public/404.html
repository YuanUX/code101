<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — code101</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%231a1a1a'/%3E%3Ctext x='32' y='43' font-family='ui-monospace,Menlo,monospace' font-size='28' font-weight='600' fill='%23fcfcfa' text-anchor='middle'%3E%3E_%3C/text%3E%3C/svg%3E">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #fcfcfa;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .wrap {
      text-align: center;
      max-width: 26rem;
    }
    .mark {
      font-family: ui-monospace, Menlo, monospace;
      font-weight: 600;
      font-size: 1.1rem;
      width: 3rem;
      height: 3rem;
      border-radius: 0.75rem;
      background: #1a1a1a;
      color: #fcfcfa;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.75rem;
    }
    .code {
      font-family: ui-monospace, Menlo, monospace;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: #9a9a93;
      margin-bottom: 0.6rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 600;
      margin-bottom: 0.6rem;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.55;
      color: #56564f;
      margin-bottom: 1.75rem;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.6rem 1.15rem;
      background: #1a1a1a;
      color: #fcfcfa;
      border: none;
      border-radius: 0.6rem;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.15s ease;
    }
    .home-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="mark">&gt;_</div>
    <div class="code">404 — NOT FOUND</div>
    <h1>This page doesn't exist</h1>
    <p>The page you're looking for isn't here. It may have moved, or the link was mistyped.</p>
    <a class="home-btn" href="/">&larr;&nbsp;Back to home</a>
  </main>
</body>
</html>
