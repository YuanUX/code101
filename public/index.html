Files"},{"@type":"DefinedTerm","name":"cp [source] [destination]","alternateName":"Copy","description":"Duplicates a code file or graphical component asset and ports it into another folder location code line.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cp -r [source] [destination]","alternateName":"Copy","description":"Duplicates an entire folder and all its contents into a new location—like duplicating an entire component library.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"mv [source] [destination]","alternateName":"Move","description":"Relocates or completely renames an existing directory canvas template asset file position dynamically.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"rm [file-name]","alternateName":"Remove","description":"Deletes a targeted file instantly.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"rm -rf [folder-name]","alternateName":"Remove","description":"Force-deletes an entire folder and everything inside it.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cat [file]","alternateName":"Concatenate","description":"Spits out the full contents of a text file directly into your terminal window—like peeking inside a design token file or config sheet.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"less [file]","alternateName":"Less","description":"Opens a file in a scrollable view so you can browse long documents or logs line by line without flooding the terminal.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"head [file]","alternateName":"Head","description":"Shows only the very first lines of a file so you can quickly peek at headers, imports, or front matter without opening the whole document.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"tail [file]","alternateName":"Tail","description":"Displays the last few lines of a file—perfect for checking recent log entries or the end of a long build output.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"echo [text]","alternateName":"Echo","description":"Prints text back to the terminal or pipes it into a file—handy for generating config files or environment variables on the fly.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"grep [pattern] [file]","alternateName":"Global regular expression print","description":"Scans files line-by-line to find matching text patterns, like hunting down a specific color variable across hundreds of style sheets.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"find [path] -name [pattern]","alternateName":"Find","description":"Recursively searches directories for files matching a name pattern—like locating every SVG icon scattered across your project tree.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"du -sh [folder]","alternateName":"Disk usage","description":"Shows the total size of a folder in human-readable format—handy for checking if your design assets are bloating the project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"ln -s [target] [link]","alternateName":"Link","description":"Creates a symbolic link that acts as a shortcut to another file or folder—useful for aliasing shared asset directories.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"brew install [package]","alternateName":"Brew install","description":"Downloads and installs system-level software utilities, languages, or background tools directly onto your Mac environment via Homebrew.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"brew update","alternateName":"Brew update","description":"Scans the global Homebrew registry database to discover if newer versions of your installed development tools are available.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"brew upgrade","alternateName":"Brew upgrade","description":"Downloads, compiles, and installs the latest updates for all system-level tools fetched through Homebrew.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm init","alternateName":"Node package manager init","description":"Scaffolds a fresh package.json for your project—the first step before installing any dependencies.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm install","alternateName":"Node package manager install","description":"Pulls and installs all required third-party design systems, animation libraries, or framework code specified for the project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm install [package]","alternateName":"Node package manager install","description":"Downloads and adds a single new dependency (like a charting library or animation toolkit) directly to your project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm uninstall [package]","alternateName":"Node package manager uninstall","description":"Safely removes a dependency you no longer need and cleans up your project manifest automatically.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm update","alternateName":"Node package manager update","description":"Scans active system code tracks to update safely across package modules to higher stable builds.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm ci","alternateName":"Node package manager ci","description":"Wipes local node folders cleanly to completely rebuild exact production component configurations cleanly.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npx [package]","alternateName":"Node package execute package","description":"Executes a development package template directly from the registry cloud without downloading it permanently to your machine environment (e.g., initializing scaffolding frameworks).","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm run dev","alternateName":"Node package manager run dev","description":"Launches a local web server so you can view, test, and interact with the interface directly in your browser.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Dev Server & Build"},{"@type":"DefinedTerm","name":"npm run build","alternateName":"Node package manager run build","description":"Transforms and compresses responsive web asset files into production ready HTML/CSS/JS configurations.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Dev Server & Build"},{"@type":"DefinedTerm","name":"npm run preview","alternateName":"Node package manager run preview","description":"Spins up a local server hosting your freshly compressed build to double check asset optimization paths before deployment.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Dev Server & Build"},{"@type":"DefinedTerm","name":"git init","alternateName":"Git init","description":"Turns any folder into a brand new Git repository so you can start tracking versions immediately.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git clone [url]","alternateName":"Git clone","description":"Downloads an entire remote project from GitHub (or any Git server) onto your machine as a local copy.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git status","alternateName":"Git status","description":"Audits which layout files, graphics, or code lines have been modified or created since your last save point.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git diff","alternateName":"Git diff","description":"Shows every line-by-line difference between your current edits and the last committed version—like a redline overlay for code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git add .","alternateName":"Git add","description":"Gathers and stages all of your recent changes, preparing them to be officially recorded.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git commit -m \"[msg]\"","alternateName":"Git commit","description":"Saves your staged changes into a permanent timestamp on the version timeline—like locking in a named version history inside Figma.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git push","alternateName":"Git push","description":"Uploads your locally saved commits to the remote team server (e.g., GitHub) so your developers or your AI assistant can read them.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git pull","alternateName":"Git pull","description":"Grabs and merges the latest design tokens, bug fixes, or component code pushed by the engineering team from the cloud repository.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git log --oneline","alternateName":"Git log","description":"Prints a clean, single-line historical list of all past project versions and checkpoint notes.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git branch","alternateName":"Git branch","description":"Lists all local branches in your repository and highlights which one you are currently working on.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git checkout [branch-name]","alternateName":"Git checkout","description":"Safely jumps your workspace timeline focus onto alternative feature branches or design iteration experiments.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git merge [branch]","alternateName":"Git merge","description":"Pulls changes from another branch into your current one—like merging a design exploration branch back into main.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git stash","alternateName":"Git stash","description":"Temporarily shelves your uncommitted work so you can switch contexts, then reapply it later without losing a thing.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"git reset --hard","alternateName":"Git reset","description":"Completely obliterates all unsaved modifications since your last save checkpoint.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Version Control"},{"@type":"DefinedTerm","name":"<div>","alternateName":"Division","description":"The generic container of the web—an invisible box used to group and arrange other elements, exactly like a frame in Figma.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<span>","alternateName":"Span","description":"An inline wrapper for a small piece of content, used when you want to style just a few words inside a sentence.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<h1>","alternateName":"Heading","description":"Title text ranked from <h1> (most important) down to <h6>—the web's built-in type hierarchy, like text styles in a design system.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<p>","alternateName":"Paragraph","description":"The standard element for body copy. Browsers automatically add breathing room between paragraphs.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<a href=\"\">","alternateName":"Anchor","description":"Creates a clickable link. The href attribute holds the destination URL—the single feature that makes the web a web.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<img src=\"\">","alternateName":"Image","description":"Places an image on the page. The src attribute points to the image file, and alt text describes it for accessibility.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"class=\"\"","alternateName":"Class","description":"Names an element so CSS can find and style it—like assigning a shared style to multiple layers at once.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"display: flex","alternateName":"Flexbox","description":"The web's version of auto layout—lines children up in a row or column and controls how they align, space out, and stretch.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"display: grid","alternateName":"Grid","description":"A two-dimensional layout system for arranging elements in rows and columns at the same time—ideal for full page layouts.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"padding","alternateName":"Padding","description":"Space inside a box, between its edge and its content—the same padding you set in Figma's auto layout.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"margin","alternateName":"Margin","description":"Space outside a box, pushing neighboring elements away—the gap between this element and everything around it.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"border-radius","alternateName":"Border radius","description":"Rounds the corners of a box—the exact same corner radius control you drag in any design tool.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":":hover","alternateName":"Hover state","description":"Styles that apply only while the cursor is over an element—how the web does interactive states without a prototype.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"@media","alternateName":"Media query","description":"Applies styles only at certain screen sizes—the mechanism behind responsive breakpoints for mobile, tablet, and desktop.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"<Component />","alternateName":"Component","description":"A reusable piece of interface with its own markup, style, and logic—the code twin of a Figma component.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"props","alternateName":"Properties","description":"Inputs passed into a component to customize it—like the property panel on a Figma component instance.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"state","alternateName":"State","description":"Data a component remembers that can change over time—when state updates, the interface re-renders automatically.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"useState()","alternateName":"Use state hook","description":"The hook that gives a component its own state: a current value plus a function to update it and refresh the UI.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"useEffect()","alternateName":"Use effect hook","description":"Runs side tasks after the component renders—fetching data, setting timers, or syncing with anything outside React.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"JSX","alternateName":"JavaScript XML","description":"The HTML-looking syntax written inside JavaScript files—it lets you sketch interface structure directly in code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"onClick={}","alternateName":"On click","description":"Attaches a function to an element that runs when the user clicks it—the starting point of all interactivity.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":".map()","alternateName":"Map","description":"Turns an array of data into a list of components—one product card per product, one row per result.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"key={}","alternateName":"Key","description":"A unique identifier React asks for on every item in a list so it can track, reorder, and update them efficiently.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"children","alternateName":"Children","description":"Whatever you nest between a component's opening and closing tags—the web's version of a slot in a design component.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"import","alternateName":"Import","description":"Brings code from another file into the current one—how components, styles, and libraries get shared across a project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"cd [drag folder here]","alternateName":"Drag & drop","description":"Type cd followed by a space, then drag any folder from Finder straight onto the Terminal window—its full path is pasted for you, no typing required.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"open .","alternateName":"Open","description":"Automatically brings up your current terminal folder inside the desktop Finder view.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"code .","alternateName":"Code","description":"Instantly launches the whole project folder inside Visual Studio Code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"clear","alternateName":"Clear","description":"Wipes away all old console logging text to give you a completely clean window workspace.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"Ctrl + C","alternateName":"Cancel","description":"Forces the terminal to stop whatever it is currently doing—useful for killing a running dev server or stopping an AI routine that is stuck.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"history","alternateName":"History","description":"Retrieves a numbered, chronological index listing every terminal command you have previously run on the machine.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"man [command]","alternateName":"Manual","description":"Opens the built-in help documentation for any terminal command—your offline reference manual for flags and usage.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"which [command]","alternateName":"Which","description":"Reveals the exact file path of a command's executable so you can confirm it is installed and where it lives.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"ps","alternateName":"Process snapshot","description":"Lists every running process in your terminal session—handy for spotting hung servers or runaway tasks.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"kill [pid]","alternateName":"Kill","description":"Forcefully terminates a stubborn process using its numeric process ID from the ps list.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"curl [url]","alternateName":"Curl","description":"Makes HTTP requests from the terminal—great for testing APIs, downloading files, or checking if a server is responding.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"sudo [command]","alternateName":"Super user do","description":"Runs a command with administrator privileges—required for system-wide installs or editing protected files.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"Cmd + Shift + P","alternateName":"Command palette","description":"Opens a searchable menu of every action VS Code can perform—type what you want to do and run it without memorizing menus.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + P","alternateName":"Quick open","description":"Jumps to any file in your project by typing a few letters of its name—no digging through the folder tree.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Ctrl + `","alternateName":"Toggle terminal","description":"Opens and closes the built-in terminal panel right inside the editor, so you never have to switch apps.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + /","alternateName":"Toggle comment","description":"Comments or uncomments the selected lines—the quickest way to switch code on and off while experimenting.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + Shift + F","alternateName":"Find in files","description":"Searches every file in the project at once—like hunting down a hex color across the whole codebase.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + D","alternateName":"Select next match","description":"Selects the next occurrence of your current selection and gives each one a cursor—edit them all simultaneously.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Option + ↑ / ↓","alternateName":"Move line","description":"Lifts the current line up or down through the file without cut and paste.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Shift + Option + F","alternateName":"Format document","description":"Auto-tidies indentation and spacing across the whole file—like a clean-up pass on a messy artboard.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + \\","alternateName":"Split editor","description":"Shows two files side by side—handy for editing a component and its styles at the same time.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + ,","alternateName":"Settings","description":"Opens the settings panel where fonts, themes, and editor behavior live.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"}]}]}

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfa;
            color: #1a1a1a;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .content-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 3.5rem 2rem 5rem 2rem;
        }

        ::selection {
            background: #1a1a1a;
            color: #fff;
        }

        /* Page header — full width background */
        .page-header {
            position: sticky;
            top: 0;
            background-color: rgba(252, 252, 250, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            z-index: 10;
            border-bottom: 1px solid #e6e6e1;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.2rem 2rem;
        }

        .header-title {
            font-family: ui-serif, Georgia, "Times New Roman", serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: -0.015em;
            line-height: 1.1;
            flex-shrink: 0;
            cursor: pointer;
        }

        .header-title .small-work {
            font-size: 0.8rem;
            font-weight: 400;
            color: #888;
            margin-left: 0.1rem;
            font-family: inherit;
        }

        .header-inner {
            display: flex;
            align-items: center;

            {

        function highlightSpelled(spelled, cmd) {
            const chars = [...cmd.toLowerCase()];
            let ci = 0;
            let html = "";
            for (const ch of spelled) {
                if (ci < chars.length && ch.toLowerCase() === chars[ci]) {
                    ci++;
                    html += `<span>${ch}</span>`;
                } else {
                    html += ch;
                }
            }
            return html;
        }

        // Clipboard Copy Handler Function
        function handleCopy(badge, commandText) {
            // Standardize output to clean strings (stripping example helper enclosures like brackets)
            let cleanCmd = commandText;
            if (cleanCmd.includes('[folder-name]')) cleanCmd = cleanCmd.replace('[folder-name]', '');
            if (cleanCmd.includes('[file-name]')) cleanCmd = cleanCmd.replace('[file-name]', '');
            if (cleanCmd.includes('[package]')) cleanCmd = cleanCmd.replace('[package]', '');
            if (cleanCmd.includes('[branch-name]')) cleanCmd = cleanCmd.replace('[branch-name]', '');
            if (cleanCmd.includes('[msg]')) cleanCmd = cleanCmd.replace('-m "[msg]"', '');
            if (cleanCmd.includes('[source] [destination]')) cleanCmd = cleanCmd.split(' ')[0];
            // Strip any remaining bracketed placeholders
            cleanCmd = cleanCmd.replace(/\[.*?\]/g, '').replace(/\s+/g, ' ').trim();

            
            cleanCmd = cleanCmd.trim();

            navigator.clipboard.writeText(cleanCmd).then(() => {
                badge.classList.add('copied');
                badge.textContent = "copied!";
                trackRecent(commandText);

                // Let "copied!" finish showing, then quietly refresh Recently Used
                setTimeout(() => {
                    badge.classList.remove('copied');
                    badge.textContent = commandText;
                    render(false);
                }, 800);
            }).catch(err => {
                console.error('Failed to copy to clipboard: ', err);
            });
        }

        function trackRecent(cmd) {
            let recent = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            recent = recent.filter(c => c !== cmd);
            recent.unshift(cmd);
            if (recent.length > 5) recent = recent.slice(0, 5);
            localStorage.setItem('recentCommands', JSON.stringify(recent));
        }

        function createGlossaryRow(item) {
            const row = document.createElement('div');
            row.className = "glossary-row";

            const nameCell = document.createElement('div');
            nameCell.className = "table-cell cell-name";
            const nameDiv = document.createElement('div');
            nameDiv.className = "def-name";
            nameDiv.innerHTML = highlightSpelled(item.spelled, item.cmd);
            nameCell.appendChild(nameDiv);

            const cmdCell = document.createElement('div');
            cmdCell.className = "table-cell cell-command";
            const cmdDiv = document.createElement('div');
            cmdDiv.className = "term-spelled";
            cmdDiv.textContent = item.cmd;
            cmdDiv.title = "Click to copy command";
            cmdDiv.addEventListener('click', () => handleCopy(cmdDiv, item.cmd));
            cmdCell.appendChild(cmdDiv);

            const descCell = document.createElement('div');
            descCell.className = "table-cell cell-desc";
            const descDiv = document.createElement('div');
            descDiv.className = "def-desc";
            descDiv.textContent = item.desc;
            descCell.appendChild(descDiv);

            if (item.isWarning) {
                const banner = document.createElement('div');
                banner.className = "alert-banner";
                const icon = document.createElement('i');
                icon.className = "ph-fill ph-warning alert-icon";
                const text = document.createElement('p');
                text.className = "alert-text";
                text.innerHTML = item.warningMsg.replace(/^(Extreme )?Caution:/, '<span class="font-bold">$&</span>');
                banner.appendChild(icon);
                banner.appendChild(text);
                descCell.appendChild(banner);
            }

            row.appendChild(nameCell);
            row.appendChild(cmdCell);
            row.appendChild(descCell);
            return row;
        }

        let currentTopic = null;

        function topicFromHash() {
            const key = location.hash.replace('#', '');
            return topics[key] ? key : null;
        }

        function createTopicRow(key, topic) {
            const count = commandLibrary.filter(c => categoryTopic[c.category] === key).length;

            const row = document.createElement('div');
            row.className = "topic-row";

            const info = document.createElement('div');
            const nameEl = document.createElement('h2');
            nameEl.className = "topic-name";
            nameEl.textContent = topic.title;
            const descEl = document.createElement('p');
            descEl.className = "topic-desc";
            descEl.textContent = topic.desc + " ";
            const countEl = document.createElement('span');
            countEl.className = "topic-count";
            countEl.textContent = "· " + count + " terms";
            descEl.appendChild(countEl);
            info.appendChild(nameEl);
            info.appendChild(descEl);

            const arrow = document.createElement('span');
            arrow.className = "topic-arrow";
            arrow.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

            row.appendChild(info);
            row.appendChild(arrow);
            row.addEventListener('click', () => { location.hash = key; });
            return row;
        }

        function renderHome() {
            // Recently used commands live on the home page only
            const recent = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            if (recent.length > 0) {
                const recentTitle = document.createElement('h2');
                recentTitle.className = "section-title";
                recentTitle.textContent = "Recently Used";

                const recentHr = document.createElement('hr');

                recentSection.appendChild(recentTitle);
                recentSection.appendChild(recentHr);

                const recentTable = document.createElement('div');
                recentTable.className = "glossary-table";

                recent.forEach(cmd => {
                    const item = commandLibrary.find(c => c.cmd === cmd);
                    if (!item) return;
                    recentTable.appendChild(createGlossaryRow(item));
                });

                recentSection.appendChild(recentTable);
            }

            const list = document.createElement('div');
            list.className = "glossary-section topic-list";
            for (const [key, topic] of Object.entries(topics)) {
                list.appendChild(createTopicRow(key, topic));
            }
            outputDiv.appendChild(list);
        }

        function renderSections(topicKeys, searchQuery) {
            const isSearching = searchQuery.length > 0;
            let totalMatches = 0;

            for (const topicKey of topicKeys) {
                for (const [catKey, catTitle] of Object.entries(topics[topicKey].categories)) {
                    const matchedItems = commandLibrary.filter(item => {
                        if (item.category !== catKey) return false;

                        if (!isSearching) {
                            return item.isSimple;
                        }
                        const rawSpelledClean = item.spelled.replace(/<[^>]*>/g, '').toLowerCase();
                        return (rawSpelledClean.includes(searchQuery) ||
                                item.cmd.toLowerCase().includes(searchQuery) ||
                                item.desc.toLowerCase().includes(searchQuery));
                    });

                    if (matchedItems.length === 0) continue;
                    totalMatches += matchedItems.length;

                    const sectionWrap = document.createElement('div');
                    sectionWrap.className = "glossary-section";

                    const titleEl = document.createElement('h2');
                    titleEl.className = "section-title";
                    titleEl.textContent = catTitle;

                    const hrEl = document.createElement('hr');

                    sectionWrap.appendChild(titleEl);
                    sectionWrap.appendChild(hrEl);

                    const tableWrap = document.createElement('div');
                    tableWrap.className = "glossary-table";

                    matchedItems.forEach(item => {
                        tableWrap.appendChild(createGlossaryRow(item));
                    });

                    sectionWrap.appendChild(tableWrap);
                    outputDiv.appendChild(sectionWrap);
                }
            }
            return totalMatches;
        }

        function render(animate = true) {
            const searchQuery = searchInput.value.toLowerCase().trim();
            const isSearching = searchQuery.length > 0;
            const onTopicPage = currentTopic !== null && !isSearching;

            outputDiv.classList.toggle('no-anim', !animate);
            outputDiv.innerHTML = "";
            recentSection.innerHTML = "";

            backBtn.classList.toggle('hidden', !onTopicPage);
            basicsFooter.classList.toggle('hidden', !onTopicPage);

            let totalMatches = 1;
            if (isSearching) {
                // Search spans every topic, no matter where you are
                totalMatches = renderSections(Object.keys(topics), searchQuery);
            } else if (currentTopic) {
                renderSections([currentTopic], "");
            } else {
                renderHome();
            }

            if (totalMatches === 0 && isSearching) {
                noResultsMessage.classList.remove('hidden');
                askAiSection.classList.remove('hidden');
                askAiAnswer.classList.add('hidden');
                askAiInput.value = searchInput.value;
            } else {
                noResultsMessage.classList.add('hidden');
                askAiSection.classList.add('hidden');
            }
        }

        const savedQuery = localStorage.getItem('glossarySearch');
        if (savedQuery) {
            searchInput.value = savedQuery;
        }
        currentTopic = topicFromHash();
        render();

        window.addEventListener('hashchange', function() {
            currentTopic = topicFromHash();
            render();
            window.scrollTo(0, 0);
        });

        backBtn.addEventListener('click', function() {
            location.hash = '';
        });

        searchInput.addEventListener('focus', function() {
            this.select();
        });

        const searchClear = document.getElementById('searchClear');

        function updateClear() {
            searchClear.classList.toggle('hidden', !searchInput.value);
        }

        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            localStorage.setItem('glossarySearch', query);
            render();
            updateClear();
        });

        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            searchInput.focus();
            localStorage.setItem('glossarySearch', '');
            render();
            updateClear();
        });

        updateClear();

        // Escape hatch: clear any active search and return to the topic list
        function goHome() {
            searchInput.value = '';
            localStorage.setItem('glossarySearch', '');
            updateClear();
            if (location.hash) {
                location.hash = ''; // hashchange listener re-renders
            } else {
                currentTopic = null;
                render();
            }
        }

        document.querySelector('.header-title').addEventListener('click', goHome);

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                searchInput.value = '';
                localStorage.setItem('glossarySearch', '');
                render();
                updateClear();
            }
        });

        function renderMarkdown(text) {
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Extract code blocks first, replace inline, then restore
            const blocks = [];
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m) {
                blocks.push('<pre><code>' + m.replace(/^```\w*\n?/, '').replace(/```$/, '') + '</code></pre>');
                return '\x00CODEBLOCK' + (blocks.length - 1) + '\x00';
            });
            html = html
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '• $1');
            html = html.split('\n\n').map(b => {
                const t = b.trim();
                return t ? '<p>' + t.replace(/\n/g, '<br>') + '</p>' : '';
            }).join('');
            html = html.replace(/\x00CODEBLOCK(\d+)\x00/g, function(_, n) { return blocks[+n]; });
            return html;
        }

        async function askAi() {
            const question = askAiInput.value.trim();
            if (!question) return;

            noResultsMessage.classList.add('hidden');

            askAiButton.disabled = true;
            askAiButton.textContent = "Asking...";
            askAiAnswer.classList.remove('hidden');
            askAiAnswer.innerHTML = '<p><em>Thinking...</em></p>';

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await res.json();
                askAiAnswer.innerHTML = renderMarkdown(data.answer || "Sorry, I couldn't find an answer.");
            } catch {
                askAiAnswer.innerHTML = '<p>Error connecting to AI. Try again.</p>';
            }

            askAiAnswer.querySelectorAll('code').forEach(el => {
                el.title = "Click to copy";
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        this.classList.add('copied');
                        this.dataset.orig = this.dataset.orig || text;
                        this.textContent = "copied!";
                        setTimeout(() => {
                            this.classList.remove('copied');
                            this.textContent = this.dataset.orig;
                            delete this.dataset.orig;
                        }, 600);
                    });
                });
            });

            askAiButton.disabled = false;
            askAiButton.textContent = "Ask";
        }

        askAiButton.addEventListener('click', askAi);
        askAiInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') askAi();
        });

        // Bookmark hint — browsers don't allow adding bookmarks via JS,
        // so show the keyboard shortcut for the user's platform.
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const bookmarkHint = document.getElementById('bookmarkHint');
        let bookmarkHintTimer;

        bookmarkBtn.addEventListener('click', function() {
            const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
            bookmarkHint.textContent = isMac ? "Press ⌘ D to bookmark" : "Press Ctrl + D to bookmark";
            bookmarkHint.classList.add('show');
            clearTimeout(bookmarkHintTimer);
            bookmarkHintTimer = setTimeout(() => bookmarkHint.classList.remove('show'), 2500);
        });
    </script>

</body>
</html>
