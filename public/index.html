            const count = commandLibrary.filter(c => categoryTopic[c.category] === key).length;

            const row = document.createElement('div');
            row.className = "topic-row";

            const info = document.createElement('div');
            const nameEl = document.createElement('h2');
            nameEl.className = "topic-name";
            nameEl.textContent = topic.title;
            const descEl = document.createElement('p');
            descEl.className = "topic-desc";
            descEl.textContent = topic.desc + " ";
            const countEl = document.createElement('span');
            countEl.className = "topic-count";
            countEl.textContent = "· " + count + " terms";
            descEl.appendChild(countEl);
            info.appendChild(nameEl);
            info.appendChild(descEl);

            const arrow = document.createElement('span');
            arrow.className = "topic-arrow";
            arrow.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';

            row.appendChild(info);
            row.appendChild(arrow);
            row.addEventListener('click', () => { location.hash = key; });
            return row;
        }

        function renderHome() {
            // Recently used commands live on the home page only
            const recent = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            if (recent.length > 0) {
                const recentTitle = document.createElement('h2');
                recentTitle.className = "section-title";
                recentTitle.textContent = "Recently Used";

                const recentHr = document.createElement('hr');

                recentSection.appendChild(recentTitle);
                recentSection.appendChild(recentHr);

                const recentTable = document.createElement('div');
                recentTable.className = "glossary-table";

                recent.forEach(cmd => {
                    const item = commandLibrary.find(c => c.cmd === cmd);
                    if (!item) return;
                    recentTable.appendChild(createGlossaryRow(item));
                });

                recentSection.appendChild(recentTable);
            }

            const list = document.createElement('div');
            list.className = "glossary-section topic-list";
            for (const [key, topic] of Object.entries(topics)) {
                list.appendChild(createTopicRow(key, topic));
            }
            outputDiv.appendChild(list);
        }

        function renderSections(topicKeys, searchQuery) {
            const isSearching = searchQuery.length > 0;
            let totalMatches = 0;

            for (const topicKey of topicKeys) {
                for (const [catKey, catTitle] of Object.entries(topics[topicKey].categories)) {
                    const matchedItems = commandLibrary.filter(item => {
                        if (item.category !== catKey) return false;

                        if (!isSearching) {
                            return item.isSimple;
                        }
                        const rawSpelledClean = item.spelled.replace(/<[^>]*>/g, '').toLowerCase();
                        return (rawSpelledClean.includes(searchQuery) ||
                                item.cmd.toLowerCase().includes(searchQuery) ||
                                item.desc.toLowerCase().includes(searchQuery));
                    });

                    if (matchedItems.length === 0) continue;
                    totalMatches += matchedItems.length;

                    const sectionWrap = document.createElement('div');
                    sectionWrap.className = "glossary-section";

                    const titleEl = document.createElement('h2');
                    titleEl.className = "section-title";
                    titleEl.textContent = catTitle;

                    const hrEl = document.createElement('hr');

                    sectionWrap.appendChild(titleEl);
                    sectionWrap.appendChild(hrEl);

                    const tableWrap = document.createElement('div');
                    tableWrap.className = "glossary-table";

                    matchedItems.forEach(item => {
                        tableWrap.appendChild(createGlossaryRow(item));
                    });

                    sectionWrap.appendChild(tableWrap);
                    outputDiv.appendChild(sectionWrap);
                }
            }
            return totalMatches;
        }

        // Escape code, then dim comments per language
        function starterHtml(code, lang) {
            const esc = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const patterns = {
                html: /(&lt;!--[\s\S]*?--&gt;)/g,
                css: /(\/\*[\s\S]*?\*\/)/g,
                jsx: /(\{\/\*[\s\S]*?\*\/\}|\/\/[^\n]*)/g
            };
            return esc.replace(patterns[lang], '<span class="starter-comment">$1</span>');
        }

        function renderStarter(topic) {
            const st = topic.starter;
            const wrap = document.createElement('div');
            wrap.className = "glossary-section";

            const titleEl = document.createElement('h2');
            titleEl.className = "section-title";
            titleEl.textContent = "Put it together";

            const hrEl = document.createElement('hr');

            const body = document.createElement('div');
            body.className = "starter-body";

            const intro = document.createElement('p');
            intro.className = "starter-intro";
            intro.textContent = st.intro;

            const codeWrap = document.createElement('div');
            codeWrap.className = "starter-codewrap";

            const pre = document.createElement('pre');
            pre.className = "starter-code";
            pre.innerHTML = starterHtml(st.code, st.lang);

            const copyBtn = document.createElement('button');
            copyBtn.className = "starter-copy";
            copyBtn.textContent = "Copy";

            let copyTimer;
            function copyStarter() {
                navigator.clipboard.writeText(st.code).then(() => {
                    copyBtn.classList.add('copied');
                    copyBtn.textContent = "Copied!";
                    clearTimeout(copyTimer);
                    copyTimer = setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyBtn.textContent = "Copy";
                    }, 1200);
                });
            }

            copyBtn.addEventListener('click', copyStarter);

            codeWrap.appendChild(pre);
            codeWrap.appendChild(copyBtn);

            body.appendChild(intro);
            body.appendChild(codeWrap);
            wrap.appendChild(titleEl);
            wrap.appendChild(hrEl);
            wrap.appendChild(body);
            outputDiv.appendChild(wrap);
        }

        function render(animate = true) {
            const searchQuery = searchInput.value.toLowerCase().trim();
            const isSearching = searchQuery.length > 0;
            const onTopicPage = currentTopic !== null && !isSearching;

            outputDiv.classList.toggle('no-anim', !animate);
            outputDiv.innerHTML = "";
            recentSection.innerHTML = "";

            backBtn.classList.toggle('hidden', !onTopicPage);
            basicsFooter.classList.toggle('hidden', !onTopicPage);

            let totalMatches = 1;
            if (isSearching) {
                // Search spans every topic, no matter where you are
                totalMatches = renderSections(Object.keys(topics), searchQuery);
            } else if (currentTopic) {
                renderSections([currentTopic], "");
                if (topics[currentTopic].starter) renderStarter(topics[currentTopic]);
            } else {
                renderHome();
            }

            if (totalMatches === 0 && isSearching) {
                noResultsMessage.classList.remove('hidden');
                askAiSection.classList.remove('hidden');
                askAiAnswer.classList.add('hidden');
                askAiInput.value = searchInput.value;
            } else {
                noResultsMessage.classList.add('hidden');
                askAiSection.classList.add('hidden');
            }
        }

        const savedQuery = localStorage.getItem('glossarySearch');
        if (savedQuery) {
            searchInput.value = savedQuery;
        }
        currentTopic = topicFromHash();
        render();

        window.addEventListener('hashchange', function() {
            currentTopic = topicFromHash();
            render();
            window.scrollTo(0, 0);
        });

        backBtn.addEventListener('click', function() {
            location.hash = '';
        });

        searchInput.addEventListener('focus', function() {
            this.select();
        });

        const searchClear = document.getElementById('searchClear');

        function updateClear() {
            searchClear.classList.toggle('hidden', !searchInput.value);
        }

        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            localStorage.setItem('glossarySearch', query);
            render();
            updateClear();
        });

        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            searchInput.focus();
            localStorage.setItem('glossarySearch', '');
            render();
            updateClear();
        });

        updateClear();

        // Escape hatch: clear any active search and return to the topic list
        function goHome() {
            searchInput.value = '';
            localStorage.setItem('glossarySearch', '');
            updateClear();
            if (location.hash) {
                location.hash = ''; // hashchange listener re-renders
            } else {
                currentTopic = null;
                render();
            }
        }

        document.querySelector('.header-title').addEventListener('click', goHome);

        searchInput.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                searchInput.value = '';
                localStorage.setItem('glossarySearch', '');
                render();
                updateClear();
            }
        });

        function renderMarkdown(text) {
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Extract code blocks first, replace inline, then restore
            const blocks = [];
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m) {
                blocks.push('<pre><code>' + m.replace(/^```\w*\n?/, '').replace(/```$/, '') + '</code></pre>');
                return '\x00CODEBLOCK' + (blocks.length - 1) + '\x00';
            });
            html = html
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '• $1');
            html = html.split('\n\n').map(b => {
                const t = b.trim();
                return t ? '<p>' + t.replace(/\n/g, '<br>') + '</p>' : '';
            }).join('');
            html = html.replace(/\x00CODEBLOCK(\d+)\x00/g, function(_, n) { return blocks[+n]; });
            return html;
        }

        async function askAi() {
            const question = askAiInput.value.trim();
            if (!question) return;

            noResultsMessage.classList.add('hidden');

            askAiButton.disabled = true;
            askAiButton.textContent = "Asking...";
            askAiAnswer.classList.remove('hidden');
            askAiAnswer.innerHTML = '<p><em>Thinking...</em></p>';

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await res.json();
                askAiAnswer.innerHTML = renderMarkdown(data.answer || "Sorry, I couldn't find an answer.");
            } catch {
                askAiAnswer.innerHTML = '<p>Error connecting to AI. Try again.</p>';
            }

            askAiAnswer.querySelectorAll('code').forEach(el => {
                el.title = "Click to copy";
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        this.classList.add('copied');
                        this.dataset.orig = this.dataset.orig || text;
                        this.textContent = "copied!";
                        setTimeout(() => {
                            this.classList.remove('copied');
                            this.textContent = this.dataset.orig;
                            delete this.dataset.orig;
                        }, 600);
                    });
                });
            });

            askAiButton.disabled = false;
            askAiButton.textContent = "Ask";
        }

        askAiButton.addEventListener('click', askAi);
        askAiInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') askAi();
        });

        // Anonymous feedback modal
        const feedbackBtn = document.getElementById('feedbackBtn');
        const feedbackModal = document.getElementById('feedbackModal');
        const feedbackText = document.getElementById('feedbackText');
        const feedbackSend = document.getElementById('feedbackSend');
        const feedbackClose = document.getElementById('feedbackClose');

        const feedbackStars = document.getElementById('feedbackStars');
        let feedbackRating = 0;

        const STAR_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';

        function paintStars() {
            [...feedbackStars.children].forEach((star, i) => {
                star.classList.toggle('active', i < feedbackRating);
            });
        }

        for (let i = 1; i <= 5; i++) {
            const star = document.createElement('button');
            star.className = "feedback-star";
            star.innerHTML = STAR_SVG;
            star.setAttribute('aria-label', i + " star" + (i > 1 ? "s" : ""));
            star.addEventListener('click', () => {
                feedbackRating = feedbackRating === i ? 0 : i; // click again to clear
                paintStars();
            });
            feedbackStars.appendChild(star);
        }

        // iOS: the keyboard shrinks the *visual* viewport but fixed elements
        // don't know that. Keep the sheet full-screen white and instead pad
        // its bottom by the keyboard height, so content compresses above the
        // keyboard while the background stays white behind it.
        const feedbackSheet = feedbackModal.querySelector('.feedback-modal');

        function fitFeedbackSheet() {
            if (feedbackModal.classList.contains('hidden')) return;
            if (!window.visualViewport || window.innerWidth > 768) return;
            const keyboard = Math.max(0, window.innerHeight - window.visualViewport.height);
            feedbackSheet.style.paddingBottom = keyboard ? (keyboard + 16) + 'px' : '';
            feedbackModal.style.transform = 'translateY(' + window.visualViewport.offsetTop + 'px)';
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', fitFeedbackSheet);
            window.visualViewport.addEventListener('scroll', fitFeedbackSheet);
        }

        function openFeedback() {
            feedbackModal.classList.remove('hidden');
            fitFeedbackSheet();
            feedbackText.focus();
        }

        function closeFeedback() {
            feedbackModal.classList.add('hidden');
            feedbackSheet.style.paddingBottom = '';
            feedbackModal.style.transform = '';
        }

        feedbackBtn.addEventListener('click', openFeedback);
        feedbackClose.addEventListener('click', closeFeedback);
        feedbackModal.addEventListener('click', function(e) {
            if (e.target === feedbackModal) { closeFeedback(); return; }
            // Tapping empty space inside the sheet dismisses the keyboard
            if (!e.target.closest('textarea, button')) feedbackText.blur();
        });

        // The mobile keyboard's Send key submits; Shift+Enter makes a newline
        feedbackText.addEventListener('keydown', function(e) {
            if (e.isComposing) return; // IME composition: Enter just confirms the candidate
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                feedbackSend.click();
            }
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !feedbackModal.classList.contains('hidden')) closeFeedback();
        });

        feedbackSend.addEventListener('click', async function() {
            const message = feedbackText.value.trim();
            if (!message && !feedbackRating) { feedbackText.focus(); return; }

            feedbackSend.disabled = true;
            feedbackSend.textContent = "Sending...";
            try {
                const res = await fetch('/api/feedback', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ message, rating: feedbackRating || null }),
                });
                if (!res.ok) throw new Error('bad status');
                feedbackSend.textContent = "Thank you!";
                feedbackText.value = '';
                feedbackRating = 0;
                paintStars();
                setTimeout(() => {
                    closeFeedback();
                    feedbackSend.disabled = false;
                    feedbackSend.textContent = "Send";
                }, 1000);
            } catch {
                feedbackSend.disabled = false;
                feedbackSend.textContent = "Try again?";
            }
        });

        // Bookmark hint — browsers don't allow adding bookmarks via JS,
        // so show the keyboard shortcut for the user's platform.
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const bookmarkHint = document.getElementById('bookmarkHint');
        let bookmarkHintTimer;

        bookmarkBtn.addEventListener('click', function() {
            const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
            bookmarkHint.textContent = isMac ? "Press ⌘ D to bookmark" : "Press Ctrl + D to bookmark";
            bookmarkHint.classList.add('show');
            clearTimeout(bookmarkHintTimer);
            bookmarkHintTimer = setTimeout(() => bookmarkHint.classList.remove('show'), 2500);
        });
    </script>

</body>
</html>
