{"@context":"https://schema.org","@graph":[{"@type":"WebSite","@id":"https://code101.work/#website","url":"https://code101.work","name":"code101","description":"A visual glossary of essential terminal commands and HTML, CSS, and React concepts for designers. Learn pwd, ls, cd, git, flexbox, props and more with plain-English explanations.","inLanguage":"en"},{"@type":"DefinedTermSet","@id":"https://code101.work/#commands","name":"Terminal commands and front-end concepts for designers","description":"Essential terminal, git, npm, HTML, CSS, and React terms explained in plain English for designers.","hasDefinedTerm":[{"@type":"DefinedTerm","name":"pwd","alternateName":"Print working directory","description":"Prints the exact structural path of the folder you are currently looking at.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"ls","alternateName":"List","description":"Displays all visible files and folders inside your current directory position.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"ls -la","alternateName":"List all","description":"A deeper list option that unhides invisible files like design system configurations or project environment settings.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"ls -lt","alternateName":"List by time","description":"Sorts and presents folder entries showing your newest layout saves or code revisions at the absolute top.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cd [folder-name]","alternateName":"Change directory","description":"Moves your active terminal location forward into a specific subfolder.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cd ..","alternateName":"Change directory ..","description":"Tells the shell to step backward exactly one directory tier to the enclosing folder.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"../","alternateName":"Parent directory","description":"Represents a relative pathway jump. Used to target, execute, or copy assets out of the parent folder and into adjacent workspace branches (e.g., cd ../components).","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cd ...","alternateName":"Change directory ...","description":"A shortcut environment alias or framework command trick to jump backward two full folders simultaneously.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cd ~","alternateName":"Change directory home","description":"Instantly flies you straight out of deep code paths directly back into your machine root User path frame.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"mkdir [folder-name]","alternateName":"Make directory","description":"Generates a brand new, empty folder inside your current directory.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"mkdir -p [path]","alternateName":"Make directory parent","description":"Creates a folder and any missing parent folders along the path in one step—no more nesting errors.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"touch [file-name]","alternateName":"Touch","description":"Creates a new blank file instantly (e.g., a style sheet or Markdown note document).","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cp [source] [destination]","alternateName":"Copy","description":"Duplicates a code file or graphical component asset and ports it into another folder location code line.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cp -r [source] [destination]","alternateName":"Copy","description":"Duplicates an entire folder and all its contents into a new location—like duplicating an entire component library.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"mv [source] [destination]","alternateName":"Move","description":"Relocates or completely renames an existing directory canvas template asset file position dynamically.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"rm [file-name]","alternateName":"Remove","description":"Deletes a targeted file instantly.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"rm -rf [folder-name]","alternateName":"Remove","description":"Force-deletes an entire folder and everything inside it.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"cat [file]","alternateName":"Concatenate","description":"Spits out the full contents of a text file directly into your terminal window—like peeking inside a design token file or config sheet.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"less [file]","alternateName":"Less","description":"Opens a file in a scrollable view so you can browse long documents or logs line by line without flooding the terminal.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"head [file]","alternateName":"Head","description":"Shows only the very first lines of a file so you can quickly peek at headers, imports, or front matter without opening the whole document.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"tail [file]","alternateName":"Tail","description":"Displays the last few lines of a file—perfect for checking recent log entries or the end of a long build output.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"echo [text]","alternateName":"Echo","description":"Prints text back to the terminal or pipes it into a file—handy for generating config files or environment variables on the fly.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"grep [pattern] [file]","alternateName":"Global regular expression print","description":"Scans files line-by-line to find matching text patterns, like hunting down a specific color variable across hundreds of style sheets.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"find [path] -name [pattern]","alternateName":"Find","description":"Recursively searches directories for files matching a name pattern—like locating every SVG icon scattered across your project tree.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"du -sh [folder]","alternateName":"Disk usage","description":"Shows the total size of a folder in human-readable format—handy for checking if your design assets are bloating the project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"ln -s [target] [link]","alternateName":"Link","description":"Creates a symbolic link that acts as a shortcut to another file or folder—useful for aliasing shared asset directories.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Manipulate Files"},{"@type":"DefinedTerm","name":"brew install [package]","alternateName":"Brew install","description":"Downloads and installs system-level software utilities, languages, or background tools directly onto your Mac environment via Homebrew.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"brew update","alternateName":"Brew update","description":"Scans the global Homebrew registry database to discover if newer versions of your installed development tools are available.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"brew upgrade","alternateName":"Brew upgrade","description":"Downloads, compiles, and installs the latest updates for all system-level tools fetched through Homebrew.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm init","alternateName":"Node package manager init","description":"Scaffolds a fresh package.json for your project—the first step before installing any dependencies.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm install","alternateName":"Node package manager install","description":"Pulls and installs all required third-party design systems, animation libraries, or framework code specified for the project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm install [package]","alternateName":"Node package manager install","description":"Downloads and adds a single new dependency (like a charting library or animation toolkit) directly to your project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm uninstall [package]","alternateName":"Node package manager uninstall","description":"Safely removes a dependency you no longer need and cleans up your project manifest automatically.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm update","alternateName":"Node package manager update","description":"Scans active system code tracks to update safely across package modules to higher stable builds.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm ci","alternateName":"Node package manager ci","description":"Wipes local node folders cleanly to completely rebuild exact production component configurations cleanly.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npx [package]","alternateName":"Node package execute","description":"Executes a development package template directly from the registry cloud without downloading it permanently to your machine environment (e.g., initializing scaffolding frameworks).","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Install Dependencies"},{"@type":"DefinedTerm","name":"npm run dev","alternateName":"Node package manager run dev","description":"Launches a local web server so you can view, test, and interact with the interface directly in your browser.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Dev Server & Build"},{"@type":"DefinedTerm","name":"npm run build","alternateName":"Node package manager run build","description":"Transforms and compresses responsive web asset files into production ready HTML/CSS/JS configurations.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Dev Server & Build"},{"@type":"DefinedTerm","name":"npm run preview","alternateName":"Node package manager run preview","description":"Spins up a local server hosting your freshly compressed build to double check asset optimization paths before deployment.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Dev Server & Build"},{"@type":"DefinedTerm","name":"git init","alternateName":"Git init","description":"Turns any folder into a brand new Git repository so you can start tracking versions immediately.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git clone [url]","alternateName":"Git clone","description":"Downloads an entire remote project from GitHub (or any Git server) onto your machine as a local copy.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git status","alternateName":"Git status","description":"Audits which layout files, graphics, or code lines have been modified or created since your last save point.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git diff","alternateName":"Git diff","description":"Shows every line-by-line difference between your current edits and the last committed version—like a redline overlay for code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git add .","alternateName":"Git add","description":"Gathers and stages all of your recent changes, preparing them to be officially recorded.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git commit -m \"[msg]\"","alternateName":"Git commit","description":"Saves your staged changes into a permanent timestamp on the version timeline—like locking in a named version history inside Figma.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git push","alternateName":"Git push","description":"Uploads your locally saved commits to the remote team server (e.g., GitHub) so your developers or your AI assistant can read them.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git pull","alternateName":"Git pull","description":"Grabs and merges the latest design tokens, bug fixes, or component code pushed by the engineering team from the cloud repository.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git log --oneline","alternateName":"Git log","description":"Prints a clean, single-line historical list of all past project versions and checkpoint notes.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git branch","alternateName":"Git branch","description":"Lists all local branches in your repository and highlights which one you are currently working on.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git checkout [branch-name]","alternateName":"Git checkout","description":"Safely jumps your workspace timeline focus onto alternative feature branches or design iteration experiments.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git merge [branch]","alternateName":"Git merge","description":"Pulls changes from another branch into your current one—like merging a design exploration branch back into main.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git stash","alternateName":"Git stash","description":"Temporarily shelves your uncommitted work so you can switch contexts, then reapply it later without losing a thing.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"git reset --hard","alternateName":"Git reset","description":"Completely obliterates all unsaved modifications since your last save checkpoint.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Git"},{"@type":"DefinedTerm","name":"<!DOCTYPE html>","alternateName":"Document skeleton","description":"The boilerplate every page starts with—<!DOCTYPE> declares modern HTML, <html> wraps everything, <head> holds invisible setup like the <title>, and <body> holds what you see.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<div>","alternateName":"Division","description":"The generic container of the web—an invisible box used to group and arrange other elements, exactly like a frame in Figma.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<span>","alternateName":"Span","description":"An inline wrapper for a small piece of content, used when you want to style just a few words inside a sentence.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<h1>","alternateName":"Heading","description":"Title text ranked from <h1> (most important) down to <h6>—the web's built-in type hierarchy, like text styles in a design system.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<p>","alternateName":"Paragraph","description":"The standard element for body copy. Browsers automatically add breathing room between paragraphs.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<a href=\"\">","alternateName":"Anchor","description":"Creates a clickable link. The href attribute holds the destination URL—the single feature that makes the web a web.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<img src=\"\">","alternateName":"Image","description":"Places an image on the page. The src attribute points to the image file, and alt text describes it for accessibility.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<button>","alternateName":"Button","description":"A clickable control wired for keyboards and screen readers out of the box—always use it over a styled div for actions.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<input>","alternateName":"Input","description":"A field users type into—text, email, password, checkbox, and more, chosen by its type attribute.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<ul> <li>","alternateName":"List","description":"An unordered (bulleted) list and its items—the right structure for menus, nav links, and any repeating row.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<header> <main> <footer>","alternateName":"Page landmarks","description":"Semantic regions that name your page's anatomy—header, navigation, main content, footer—so browsers and screen readers understand the layout.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<link rel=\"stylesheet\">","alternateName":"Stylesheet link","description":"Lives in the <head> and connects a CSS file to the page—the one line that lets styles.css style index.html.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"class=\"\"","alternateName":"Class","description":"Names an element so CSS can find and style it—like assigning a shared style to multiple layers at once.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"alt=\"\"","alternateName":"Alt text","description":"Describes an image in words for screen readers and broken connections—accessible design starts here.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"<!-- -->","alternateName":"Comment","description":"A note in the markup the browser ignores—annotate structure for teammates or your future self. Visible in view-source, so never put secrets in one.","inDefinedTermSet":"https://code101.work/#commands","termCode":"HTML"},{"@type":"DefinedTerm","name":"display: flex","alternateName":"Flexbox","description":"The web's version of auto layout—lines children up in a row or column and controls how they align, space out, and stretch.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"display: grid","alternateName":"Grid","description":"A two-dimensional layout system for arranging elements in rows and columns at the same time—ideal for full page layouts.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"flex-direction","alternateName":"Flex direction","description":"Chooses whether a flex container lays its children in a row (the default) or stacks them in a column—the direction toggle of auto layout.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"gap","alternateName":"Gap","description":"The space between items in a flex or grid container—identical to the gap slider in Figma's auto layout.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"justify-content","alternateName":"Justify content","description":"Aligns children along the main axis of a flexbox—start, center, space-between—the alignment controls of auto layout.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"align-items","alternateName":"Align items","description":"Aligns children across the other axis of a flexbox—top, center, stretch—the cross-axis partner of justify-content.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"padding","alternateName":"Padding","description":"Space inside a box, between its edge and its content—the same padding you set in Figma's auto layout.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"margin","alternateName":"Margin","description":"Space outside a box, pushing neighboring elements away—the gap between this element and everything around it.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"font-family","alternateName":"Font family","description":"Sets the typeface, with fallbacks in case the first choice is missing—a bare sans-serif falls back to the system font.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"font-size","alternateName":"Font size","description":"Sets how large text renders—usually in px or rem (a flexible unit that respects the user's browser settings).","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"font-weight","alternateName":"Font weight","description":"Controls how bold text is, from 100 (thin) to 900 (black)—the same weight scale your type system already uses.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"line-height","alternateName":"Line height","description":"Sets the vertical rhythm of text—the exact same line height value you tune in your type styles.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"color","alternateName":"Color","description":"Sets the text color. Takes hex codes, rgb, or named colors—the same values you copy from your design file.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"background","alternateName":"Background","description":"Fills an element with a color, gradient, or image—the fill property of the web.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"border-radius","alternateName":"Border radius","description":"Rounds the corners of a box—the exact same corner radius control you drag in any design tool.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"box-shadow","alternateName":"Box shadow","description":"Adds drop shadows with offset, blur, spread, and color—the same shadow controls you tweak in any design tool.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"transition","alternateName":"Transition","description":"Animates property changes smoothly over time, so hover states fade instead of snapping—like smart animate for the web.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"transform","alternateName":"Transform","description":"Moves, scales, or rotates an element without disturbing the layout around it—translateY(-2px) is the gentle lift on a hover.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"z-index","alternateName":"Z index","description":"Controls which overlapping element sits on top—the web's version of layer order.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":":hover","alternateName":"Hover state","description":"Styles that apply only while the cursor is over an element—how the web does interactive states without a prototype.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"@media","alternateName":"Media query","description":"Applies styles only at certain screen sizes—the mechanism behind responsive breakpoints for mobile, tablet, and desktop.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"var(--token)","alternateName":"Variable","description":"CSS variables—define a color or size once and reuse it everywhere, exactly like design tokens or Figma variables.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"/* */","alternateName":"Comment","description":"A note inside a stylesheet the browser skips—label sections and explain the magic numbers. The only comment style CSS understands.","inDefinedTermSet":"https://code101.work/#commands","termCode":"CSS"},{"@type":"DefinedTerm","name":"console.log()","alternateName":"Console log","description":"Prints anything to the browser's console (right-click → Inspect → Console)—the flashlight you point at code to see what it's doing.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"//","alternateName":"Comment","description":"Everything after // on a line is a note for humans, ignored by the computer—/* */ wraps longer blocks across multiple lines.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"const · let","alternateName":"Constant & let","description":"The two ways to name a value: const for things that won't be reassigned (most of them), let for things that will.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"function","alternateName":"Function","description":"A named, reusable block of steps—define it once, run it whenever you call its name.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"() =>","alternateName":"Arrow function","description":"The compact way to write a function—you'll see it everywhere in modern code, especially inside React props like onClick.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"if (...) { }","alternateName":"If & else","description":"Branching: do this when the condition is true, otherwise do that—the logic behind every interactive decision.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"a ? b : c","alternateName":"Ternary","description":"An if/else squeezed into one line: condition ? value-if-true : value-if-false. AI-generated code loves it.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"[ ]","alternateName":"Array","description":"An ordered list of values—your five recent commands, a row of nav links, a set of products to render.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"{ }","alternateName":"Object","description":"A labeled bundle of values, like { name, size, color }—the shape of almost all data you'll see, including JSON.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"`Hello ${name}`","alternateName":"Template literal","description":"Strings written with backticks that can embed live values—how text and data get mixed together.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"===","alternateName":"Strict equality","description":"The trustworthy way to compare two values in JavaScript—always three equals signs, not two.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"document.querySelector()","alternateName":"Query selector","description":"Finds an element on the page using the same selectors as CSS—grab '.card' and you can change it from code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"addEventListener()","alternateName":"Event listener","description":"Waits for something to happen—a click, a keypress, a scroll—then runs your function. The heartbeat of interactivity.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"classList.toggle()","alternateName":"Class list toggle","description":"Adds or removes a CSS class from an element—the simplest way to switch between visual states you designed in CSS.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"async / await","alternateName":"Async & await","description":"Marks code that has to wait for something slow (like an API reply) without freezing the page—await pauses, the page keeps breathing.","inDefinedTermSet":"https://code101.work/#commands","termCode":"JavaScript"},{"@type":"DefinedTerm","name":"type X =","alternateName":"Type alias","description":"Names any type so you can reuse it—an object shape, a union, an array, or even just a number. For object shapes it's interface's twin, and the spelling AI-generated code uses most.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"interface","alternateName":"Interface","description":"Describes the exact shape of an object—which fields exist and their types. The props table of a component, written in code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":": string","alternateName":"Type annotation","description":"TypeScript's label on a value—name: string means this can only ever be text. Like putting constraints on a layer.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"string[]","alternateName":"Array type","description":"A list where every item shares one type—string[] is a list of strings, like the tags on a card. string[][] reads as a grid of text (think table rows).","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"\"sm\" | \"md\"","alternateName":"Union type","description":"A value locked to a fixed set of options—size: \"sm\" | \"md\" is exactly component variants. Also joins whole shapes: a content block that is either text, table, or chart.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"?","alternateName":"Optional","description":"A question mark after a name means the field or argument may be left out—disabled?: boolean is a prop you can skip.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"<T>","alternateName":"Generic","description":"A type placeholder filled in later—useState<boolean>(false) promises this state will always hold true or false. The angle brackets all over AI-generated code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"any","alternateName":"Any","description":"The escape hatch that turns type checking off for a value—AI-generated code reaches for it when unsure, and it's usually a smell.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"as","alternateName":"Type assertion","description":"Manually overrides what TypeScript thinks a value is—'trust me, it's this type.' Fine in small doses, suspicious in bulk.","inDefinedTermSet":"https://code101.work/#commands","termCode":"TypeScript"},{"@type":"DefinedTerm","name":"<Component />","alternateName":"Component","description":"A reusable piece of interface with its own markup, style, and logic—the code twin of a Figma component.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"props","alternateName":"Properties","description":"Inputs passed into a component to customize it—like the property panel on a Figma component instance.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"state","alternateName":"State","description":"Data a component remembers that can change over time—when state updates, the interface re-renders automatically.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"useState()","alternateName":"Use state hook","description":"The hook that gives a component its own state: a current value plus a function to update it and refresh the UI.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"useEffect()","alternateName":"Use effect hook","description":"Runs side tasks after the component renders—fetching data, setting timers, or syncing with anything outside React.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"JSX","alternateName":"JavaScript XML","description":"The HTML-looking syntax written inside JavaScript files—it lets you sketch interface structure directly in code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"{/* */}","alternateName":"Comment","description":"How you write notes inside JSX markup—a JS block comment wrapped in braces. Plain // only works outside the tags; the Card starter below shows both.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"className=\"\"","alternateName":"Class name","description":"How you attach CSS classes in JSX—class is already a reserved word in JavaScript, so React renames it.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"onClick={}","alternateName":"On click","description":"Attaches a function to an element that runs when the user clicks it—the starting point of all interactivity.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"{isOpen && <Modal />}","alternateName":"Conditional render","description":"Shows a component only when a condition is true—like toggling a layer's visibility based on state.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":".map()","alternateName":"Map","description":"Turns an array of data into a list of components—one product card per product, one row per result.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"key={}","alternateName":"Key","description":"A unique identifier React asks for on every item in a list so it can track, reorder, and update them efficiently.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"children","alternateName":"Children","description":"Whatever you nest between a component's opening and closing tags—the web's version of a slot in a design component.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"import","alternateName":"Import","description":"Brings code from another file into the current one—how components, styles, and libraries get shared across a project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"export default","alternateName":"Export","description":"Marks the component a file shares with the rest of the project—the partner of import: one file exports, another brings it in.","inDefinedTermSet":"https://code101.work/#commands","termCode":"React"},{"@type":"DefinedTerm","name":"API","alternateName":"Application programming interface","description":"The counter where two programs talk—your page places an order ('give me an answer') and the server kitchen cooks it and hands it back.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"fetch()","alternateName":"Fetch","description":"The one line of JavaScript that calls an API from the browser—ask a URL, await the reply.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"JSON","alternateName":"JavaScript Object Notation","description":"The format front end and back end speak to each other—looks just like a JavaScript object, but it's plain text any language can read.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"GET / POST","alternateName":"Get & post","description":"The two verbs of the web: GET reads data (loading a page), POST submits it (sending a form, or a question to an AI).","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"200 · 404 · 500","alternateName":"Status codes","description":"Every reply carries a number: 200 means success, 404 means not found, 500 means the server itself broke.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"/api/ask","alternateName":"Endpoint","description":"A specific address an API answers at—this site's Ask AI lives at /api/ask.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"database","alternateName":"Database","description":"Permanent storage on the server, shared by every user—unlike localStorage, which lives only inside one person's browser.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"localStorage","alternateName":"Local storage","description":"A small key-value store inside the user's browser—this site uses it to remember your recently copied commands.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":".env","alternateName":"Environment variables","description":"A file of settings and secrets that lives outside your code—API keys go here so they never end up on GitHub.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"API_KEY","alternateName":"API key","description":"A password that lets your code use a paid service, like an AI model.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"auth","alternateName":"Authentication","description":"Proving who the user is—logins, sessions, and the tokens that travel with each request.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"serverless","alternateName":"Serverless","description":"Back-end code that runs without you managing a server—this site is a Cloudflare Worker that wakes up per request, anywhere on earth.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"deploy","alternateName":"Deploy","description":"Pushing your code to the live internet—for this site it's a single command: npx wrangler deploy.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Backend"},{"@type":"DefinedTerm","name":"npm install react","alternateName":"React","description":"The library that lets you build interfaces out of reusable components—open source from Meta, and the reason the React topic exists.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npx create-next-app","alternateName":"Next.js","description":"The most popular React framework—adds pages, routing, image optimization, and server rendering so your site is fast by default.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install tailwindcss","alternateName":"Tailwind CSS","description":"Styling through tiny utility classes right in your HTML—like composing from a constrained set of design tokens instead of freeform CSS.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npx shadcn init","alternateName":"shadcn/ui","description":"Beautifully designed components you copy into your own codebase—built on Tailwind and Radix, fully yours to restyle.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install lucide-react","alternateName":"Lucide","description":"A clean open-source icon set, successor to Feather—every icon ships as a component, stroke-based like a good design system.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install @phosphor-icons/react","alternateName":"Phosphor","description":"An icon family with six weights per icon—thin to bold, plus fill and duotone—so a tab can switch from outline to solid when selected. Powering the warning icons on this very site.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install motion","alternateName":"Motion","description":"The animation library behind most slick React interfaces (formerly Framer Motion)—spring physics, gestures, and layout animations in a few lines.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install gsap","alternateName":"GSAP","description":"The industry-standard web animation toolkit—timelines, scroll-triggered scenes, and buttery easing beyond what CSS can do.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install three","alternateName":"Three.js","description":"3D in the browser—scenes, cameras, lights, and materials without writing raw graphics code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install echarts","alternateName":"ECharts","description":"Apache's powerful charting library—dashboards, maps, and every chart type you can sketch, themeable to match your design system.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install d3","alternateName":"D3","description":"The foundation of custom data visualization—binds data directly to elements so you control every axis, curve, and transition.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm create vite","alternateName":"Vite","description":"A lightning-fast dev server and build tool—the modern default for starting any new web project.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npm install typescript","alternateName":"TypeScript","description":"JavaScript with types—catches mistakes as you write and powers the autocomplete that makes editors feel smart.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"npx storybook init","alternateName":"Storybook","description":"A workshop for building and documenting UI components in isolation—the living style guide your design system deserves.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Libraries"},{"@type":"DefinedTerm","name":"Tab","alternateName":"Tab complete","description":"Type the first few letters of a command or file name and press Tab—the terminal finishes it for you. Press it twice to list every match. The single biggest typing-saver.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"cd [drag folder here]","alternateName":"Drag & drop","description":"Type cd followed by a space, then drag any folder from Finder straight onto the Terminal window—its full path is pasted for you, no typing required.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"open .","alternateName":"Open","description":"Automatically brings up your current terminal folder inside the desktop Finder view.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"code .","alternateName":"Code","description":"Instantly launches the whole project folder inside Visual Studio Code.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"clear","alternateName":"Clear","description":"Wipes away all old console logging text to give you a completely clean window workspace.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"Ctrl + C","alternateName":"Cancel","description":"Forces the terminal to stop whatever it is currently doing—useful for killing a running dev server or stopping an AI routine that is stuck.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"history","alternateName":"History","description":"Retrieves a numbered, chronological index listing every terminal command you have previously run on the machine.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"man [command]","alternateName":"Manual","description":"Opens the built-in help documentation for any terminal command—your offline reference manual for flags and usage.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"which [command]","alternateName":"Which","description":"Reveals the exact file path of a command's executable so you can confirm it is installed and where it lives.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"ps","alternateName":"Process snapshot","description":"Lists every running process in your terminal session—handy for spotting hung servers or runaway tasks.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"kill [pid]","alternateName":"Kill","description":"Forcefully terminates a stubborn process using its numeric process ID from the ps list.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"curl [url]","alternateName":"Curl","description":"Makes HTTP requests from the terminal—great for testing APIs, downloading files, or checking if a server is responding.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"sudo [command]","alternateName":"Super user do","description":"Runs a command with administrator privileges—required for system-wide installs or editing protected files.","inDefinedTermSet":"https://code101.work/#commands","termCode":"Terminal — Shortcuts"},{"@type":"DefinedTerm","name":"Cmd + Shift + P","alternateName":"Command palette","description":"Opens a searchable menu of every action VS Code can perform—type what you want to do and run it without memorizing menus.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + P","alternateName":"Quick open","description":"Jumps to any file in your project by typing a few letters of its name—no digging through the folder tree.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Ctrl + `","alternateName":"Toggle terminal","description":"Opens and closes the built-in terminal panel right inside the editor, so you never have to switch apps.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + /","alternateName":"Toggle comment","description":"Comments or uncomments the selected lines—the quickest way to switch code on and off while experimenting.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + Shift + F","alternateName":"Find in files","description":"Searches every file in the project at once—like hunting down a hex color across the whole codebase.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + D","alternateName":"Select next match","description":"Selects the next occurrence of your current selection and gives each one a cursor—edit them all simultaneously.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Option + ↑ / ↓","alternateName":"Move line","description":"Lifts the current line up or down through the file without cut and paste.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Shift + Option + F","alternateName":"Format document","description":"Auto-tidies indentation and spacing across the whole file—like a clean-up pass on a messy artboard.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + \\","alternateName":"Split editor","description":"Shows two files side by side—handy for editing a component and its styles at the same time.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"},{"@type":"DefinedTerm","name":"Cmd + ,","alternateName":"Settings","description":"Opens the settings panel where fonts, themes, and editor behavior live.","inDefinedTermSet":"https://code101.work/#commands","termCode":"VS Code"}]}]}

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fcfcfa;
            color: #1a1a1a;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .content-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 3.5rem 2rem 5rem 2rem;
        }

        ::selection {
            background: #1a1a1a;
            color: #fff;
        }

        /* Page header — full width background */
        .page-header {
            position: sticky;
            top: 0;
            background-color: rgba(252, 252, 250, 0.85);
            -webkit-backdrop-filter: blur(12px);
            backdrop-filter: blur(12px);
            z-index: 10;
            border-bottom: 1px solid #e6e6e1;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.2rem 2rem;
        }

        .header-title {
            font-family: ui-serif, Georgia, "Times New Roman", serif;
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: -0.015em;
            line-height: 1.1;
            flex-shrink: 0;
            cursor: pointer;
        }

        .header-title .small-work {
            font-size: 0.8rem;
            font-weight: 400;
            color: #888;
            margin-left: 0.1rem;
            font-family: inherit;
        }

        .header-inner {
            display: flex;
            align-items: center;
            flex: 1;
            min-width: 0;
            max-width: 900px;
            margin: 0 auto;
        }

        .header-search-wrap {
            position: relative;
            flex: 1;
            min-width: 0;
        }

        .header-search-wrap .search-icon {
            position: absolute;
            left: 0.1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 1rem;
            height: 1rem;
            color: #b3b3ae;
            pointer-events: none;
        }

        .header-search-wrap input {
            width: 100%;
            font-size: 0.95rem;
            font-weight: 300;
            padding: 0.5rem 1.6rem 0.5rem 1.5rem;
            border: none;
            border-bottom: 1px solid #ddd;
            background: transparent;
            outline: none;
            color: #1a1a1a;
        }

        .header-search-wrap input:focus {
            border-bottom-color: #1a1a1a;
        }

        .header-search-wrap input::placeholder {
            color: #b3b3ae;
            font-weight: 300;
        }

        .header-search-wrap .search-clear {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 1.2rem;
            height: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            font-size: 0.8rem;
            color: #b3b3ae;
            cursor: pointer;
            padding: 0;
        }

        .header-search-wrap .search-clear:hover {
            color: #1a1a1a;
        }

        .bookmark-btn {
            flex-shrink: 0;
            width: 2.1rem;
            height: 2.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: 1px solid transparent;
            border-radius: 8px;
            color: #b3b3ae;
            cursor: pointer;
            transition: all 0.15s ease;
            position: relative;
        }

        .bookmark-btn svg {
            width: 1.1rem;
            height: 1.1rem;
        }

        .bookmark-btn:hover {
            color: #1a1a1a;
            border-color: #e6e6e1;
            background: #fff;
        }

        .bookmark-hint {
            position: absolute;
            top: 2.5rem;
            right: 0;
            font-size: 0.75rem;
            color: #fcfcfa;
            background: #1a1a1a;
            padding: 0.35rem 0.65rem;
            border-radius: 6px;
            white-space: nowrap;
            opacity: 0;
            transform: translateY(-3px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .bookmark-hint.show {
            opacity: 1;
            transform: none;
        }
        /* Traditional table layout */
        .glossary-section {
            margin-top: 4rem;
            animation: fadeUp 0.4s ease both;
        }

        .glossary-section:nth-child(2) { animation-delay: 0.05s; }
        .glossary-section:nth-child(3) { animation-delay: 0.1s; }
        .glossary-section:nth-child(4) { animation-delay: 0.15s; }
        .glossary-section:nth-child(5) { animation-delay: 0.2s; }
        .glossary-section:nth-child(6) { animation-delay: 0.25s; }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .glossary-section {
                animation: none;
            }
        }

        /* Quiet re-renders (e.g. after copying) skip the entrance animation */
        #glossaryOutput.no-anim .glossary-section {

        // Shortcuts like "Cmd + P": bold the key letter where it appears in the
        // name (Quick oPen), instead of letter-matching the whole command.
        function highlightKeys(spelled, cmd) {
            const keys = cmd.split('+')
                .map(t => t.trim())
                .filter(t => t.length === 1 && /[a-z]/i.test(t))
                .map(t => t.toLowerCase());
            const positions = new Set();
            for (const k of keys) {
                const idx = spelled.toLowerCase().indexOf(k);
                if (idx !== -1) positions.add(idx);
            }
            return [...spelled]
                .map((ch, i) => positions.has(i) ? `<span>${ch}</span>` : ch)
                .join('');
        }

        function highlightSpelled(spelled, cmd) {
            // Pass 1: walk the name, lighting up letters that spell out the
            // command's letters in order (Print working directory -> pwd).
            // Drop attribute tokens (href="", src="") so only the tag/command
            // words count, then strip to letters so brackets don't block it.
            const target = cmd.toLowerCase()
                .split(/\s+/)
                .filter(t => !t.includes('=') && !t.includes('"'))
                .join('')
                .replace(/[^a-z]/g, '');
            let ti = 0;
            let matched = 0;
            let html = "";
            for (const ch of spelled) {
                if (ti < target.length && ch.toLowerCase() === target[ti]) {
                    ti++;
                    matched++;
                    html += `<span>${ch}</span>`;
                } else {
                    html += ch;
                }
            }
            // Accept when it's a real signal: 2+ letters, or a short command
            // fully spelled out (<h1> -> Heading).
            if (matched >= 2 || (target.length > 0 && matched === target.length)) return html;

            // Pass 2: the term sits mid-command (display: flex) — bold the
            // longest stretch of the name the command actually contains.
            const lower = spelled.toLowerCase();
            const cmdLower = cmd.toLowerCase();
            let best = { len: 0, start: 0 };
            for (let i = 0; i < spelled.length; i++) {
                for (let len = spelled.length - i; len >= 3; len--) {
                    if (cmdLower.includes(lower.slice(i, i + len))) {
                        if (len > best.len) best = { len, start: i };
                        break;
                    }
                }
            }
            if (best.len >= 3) {
                return spelled.slice(0, best.start)
                    + '<span>' + spelled.slice(best.start, best.start + best.len) + '</span>'
                    + spelled.slice(best.start + best.len);
            }

            // No letter overlap (pure-symbol commands) — calm gray.
            return spelled;
        }

        // Clipboard Copy Handler Function
        function handleCopy(badge, commandText) {
            // Standardize output to clean strings (stripping example helper enclosures like brackets)
            let cleanCmd = commandText;
            if (cleanCmd.includes('[folder-name]')) cleanCmd = cleanCmd.replace('[folder-name]', '');
            if (cleanCmd.includes('[file-name]')) cleanCmd = cleanCmd.replace('[file-name]', '');
            if (cleanCmd.includes('[package]')) cleanCmd = cleanCmd.replace('[package]', '');
            if (cleanCmd.includes('[branch-name]')) cleanCmd = cleanCmd.replace('[branch-name]', '');
            if (cleanCmd.includes('[msg]')) cleanCmd = cleanCmd.replace('-m "[msg]"', '');
            if (cleanCmd.includes('[source] [destination]')) cleanCmd = cleanCmd.split(' ')[0];
            // Strip any remaining bracketed placeholders
            cleanCmd = cleanCmd.replace(/\[.*?\]/g, '').replace(/\s+/g, ' ').trim();

            
            cleanCmd = cleanCmd.trim();

            navigator.clipboard.writeText(cleanCmd).then(() => {
                badge.classList.add('copied');
                badge.textContent = "copied!";
                trackRecent(commandText);

                // Let "copied!" finish showing, then quietly refresh Recently Used
                setTimeout(() => {
                    badge.classList.remove('copied');
                    badge.textContent = commandText;
                    render(false);
                }, 800);
            }).catch(err => {
                console.error('Failed to copy to clipboard: ', err);
            });
        }

        function trackRecent(cmd) {
            let recent = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            recent = recent.filter(c => c !== cmd);
            recent.unshift(cmd);
            if (recent.length > 5) recent = recent.slice(0, 5);
            localStorage.setItem('recentCommands', JSON.stringify(recent));
        }

        function createGlossaryRow(item) {
            const row = document.createElement('div');
            row.className = "glossary-row";

            const nameCell = document.createElement('div');
            nameCell.className = "table-cell cell-name";
            const nameDiv = document.createElement('div');
            nameDiv.className = "def-name";
            if (item.category === 'vscode') {
                nameDiv.innerHTML = highlightKeys(item.spelled, item.cmd);
            } else {
                nameDiv.innerHTML = highlightSpelled(item.spelled, item.cmd);
            }
            nameCell.appendChild(nameDiv);

            const cmdCell = document.createElement('div');
            cmdCell.className = "table-cell cell-command";
            const cmdDiv = document.createElement('div');
            cmdDiv.className = "term-spelled";
            cmdDiv.textContent = item.cmd;
            cmdDiv.title = "Click to copy command";
            cmdDiv.addEventListener('click', () => handleCopy(cmdDiv, item.cmd));
            cmdCell.appendChild(cmdDiv);

            const descCell = document.createElement('div');
            descCell.className = "table-cell cell-desc";
            const descDiv = document.createElement('div');
            descDiv.className = "def-desc";
            descDiv.textContent = item.desc;
            descCell.appendChild(descDiv);

            if (item.isWarning) {
                const banner = document.createElement('div');
                banner.className = "alert-banner";
                const icon = document.createElement('i');
                icon.className = "ph-fill ph-warning alert-icon";
                const text = document.createElement('p');
                text.className = "alert-text";
                text.innerHTML = item.warningMsg.replace(/^(Extreme )?Caution:/, '<span class="font-bold">$&</span>');
                banner.appendChild(icon);
                banner.appendChild(text);
                descCell.appendChild(banner);
            }

            row.appendChild(nameCell);
            row.appendChild(cmdCell);
            row.appendChild(descCell);
            return row;
        }
