          <input type="text" id="askAiInput" class="ask-ai-input" placeholder="Ask about any terminal command..." autocomplete="off">

    <script>
        const categories = {
            "files": "Manipulate Files",
            "dependencies": "Install Dependencies",
            "server": "Dev Server & Build",
            "git": "Version Control",
            "shortcuts": "Shortcuts"
        };

        const commandLibrary = [
            // --- MANIPULATE FILES ---
            {
                category: "files", isSimple: true,
                spelled: "Print working directory", cmd: "pwd",
                desc: "Prints the exact structural path of the folder you are currently looking at."
            },
            {
                category: "files", isSimple: true,
                spelled: "List", cmd: "ls",
                desc: "Displays all visible files and folders inside your current directory position."
            },
            {
                category: "files", isSimple: false,
                spelled: "List all", cmd: "ls -la",
                desc: "A deeper list option that unhides invisible files like design system configurations or project environment settings."
            },
            {
                category: "files", isSimple: false,
                spelled: "List by time", cmd: "ls -lt",
                desc: "Sorts and presents folder entries showing your newest layout saves or code revisions at the absolute top."
            },
            {
                category: "files", isSimple: true,
                spelled: "Change directory", cmd: "cd [folder-name]",
                desc: "Moves your active terminal location forward into a specific subfolder."
            },
            {
                category: "files", isSimple: true,
                spelled: "Change directory ..", cmd: "cd ..",
                desc: "Tells the shell to step backward exactly one directory tier to the enclosing folder."
            },
            {
                category: "files", isSimple: true,
                spelled: "Parent directory", cmd: "../",
                desc: "Represents a relative pathway jump. Used to target, execute, or copy assets out of the parent folder and into adjacent workspace branches (e.g., cd ../components)."
            },
            {
                category: "files", isSimple: false,
                spelled: "Change directory ...", cmd: "cd ...",
                desc: "A shortcut environment alias or framework command trick to jump backward two full folders simultaneously."
            },
            {
                category: "files", isSimple: true,
                spelled: "Change directory home", cmd: "cd ~",
                desc: "Instantly flies you straight out of deep code paths directly back into your machine root User path frame."
            },
            {
                category: "files", isSimple: true,
                spelled: "Make directory", cmd: "mkdir [folder-name]",
                desc: "Generates a brand new, empty folder inside your current directory."
            },
            {
                category: "files", isSimple: true,
                spelled: "Touch", cmd: "touch [file-name]",
                desc: "Creates a new blank file instantly (e.g., a style sheet or Markdown note document)."
            },
            {
                category: "files", isSimple: true,
                spelled: "Remove", cmd: "rm [file-name]",
                desc: "Deletes a targeted file instantly.", isWarning: true, warningMsg: "Caution: Skips the Trash system. Deletion is immediate and final."
            },
            {
                category: "files", isSimple: false,
                spelled: "Remove", cmd: "rm -rf [folder-name]",
                desc: "Force-deletes an entire folder and everything inside it.", isWarning: true, warningMsg: "Extreme Caution: No warning prompt. Cannot be undone."
            },
            {
                category: "files", isSimple: false,
                spelled: "Copy", cmd: "cp [source] [destination]",
                desc: "Duplicates a code file or graphical component asset and ports it into another folder location code line."
            },
            {
                category: "files", isSimple: false,
                spelled: "Move", cmd: "mv [source] [destination]",
                desc: "Relocates or completely renames an existing directory canvas template asset file position dynamically."
            },
            {
                category: "files", isSimple: true,
                spelled: "Concatenate", cmd: "cat [file]",
                desc: "Spits out the full contents of a text file directly into your terminal window—like peeking inside a design token file or config sheet."
            },
            {
                category: "files", isSimple: false,
                spelled: "Global regular expression print", cmd: "grep [pattern] [file]",
                desc: "Scans files line-by-line to find matching text patterns, like hunting down a specific color variable across hundreds of style sheets."
            },
            {
                category: "files", isSimple: true,
                spelled: "Echo", cmd: "echo [text]",
                desc: "Prints text back to the terminal or pipes it into a file—handy for generating config files or environment variables on the fly."
            },
            {
                category: "files", isSimple: false,
                spelled: "Head", cmd: "head [file]",
                desc: "Shows only the very first lines of a file so you can quickly peek at headers, imports, or front matter without opening the whole document."
            },
            {
                category: "files", isSimple: false,
                spelled: "Tail", cmd: "tail [file]",
                desc: "Displays the last few lines of a file—perfect for checking recent log entries or the end of a long build output."
            },
            {
                category: "files", isSimple: false,
                spelled: "Find", cmd: "find [path] -name [pattern]",
                desc: "Recursively searches directories for files matching a name pattern—like locating every SVG icon scattered across your project tree."
            },
            {
                category: "files", isSimple: true,
                spelled: "Less", cmd: "less [file]",
                desc: "Opens a file in a scrollable view so you can browse long documents or logs line by line without flooding the terminal."
            },
            {
                category: "files", isSimple: true,
                spelled: "Disk usage", cmd: "du -sh [folder]",
                desc: "Shows the total size of a folder in human-readable format—handy for checking if your design assets are bloating the project."
            },
            {
                category: "files", isSimple: false,
                spelled: "Make directory parent", cmd: "mkdir -p [path]",
                desc: "Creates a folder and any missing parent folders along the path in one step—no more nesting errors."
            },
            {
                category: "files", isSimple: false,
                spelled: "Copy", cmd: "cp -r [source] [destination]",
                desc: "Duplicates an entire folder and all its contents into a new location—like duplicating an entire component library."
            },
            {
                category: "files", isSimple: false,
                spelled: "Link", cmd: "ln -s [target] [link]",
                desc: "Creates a symbolic link that acts as a shortcut to another file or folder—useful for aliasing shared asset directories."
            },

            // --- DEPENDENCIES ---
            {
                category: "dependencies", isSimple: true,
                spelled: "Brew install", cmd: "brew install [package]",
                desc: "Downloads and installs system-level software utilities, languages, or background tools directly onto your Mac environment via Homebrew."
            },
            {
                category: "dependencies", isSimple: true,
                spelled: "Node package manager install", cmd: "npm install",
                desc: "Pulls and installs all required third-party design systems, animation libraries, or framework code specified for the project."
            },
            {
                category: "dependencies", isSimple: true,
                spelled: "Node package execute package", cmd: "npx [package]",
                desc: "Executes a development package template directly from the registry cloud without downloading it permanently to your machine environment (e.g., initializing scaffolding frameworks)."
            },
            {
                category: "dependencies", isSimple: false,
                spelled: "Brew update", cmd: "brew update",
                desc: "Scans the global Homebrew registry database to discover if newer versions of your installed development tools are available."
            },
            {
                category: "dependencies", isSimple: false,
                spelled: "Brew upgrade", cmd: "brew upgrade",
                desc: "Downloads, compiles, and installs the latest updates for all system-level tools fetched through Homebrew."
            },
            {
                category: "dependencies", isSimple: false,
                spelled: "Node package manager ci", cmd: "npm ci",
                desc: "Wipes local node folders cleanly to completely rebuild exact production component configurations cleanly."
            },
            {
                category: "dependencies", isSimple: false,
                spelled: "Node package manager update", cmd: "npm update",
                desc: "Scans active system code tracks to update safely across package modules to higher stable builds."
            },
            {
                category: "dependencies", isSimple: true,
                spelled: "Node package manager install", cmd: "npm install [package]",
                desc: "Downloads and adds a single new dependency (like a charting library or animation toolkit) directly to your project."
            },
            {
                category: "dependencies", isSimple: false,
                spelled: "Node package manager uninstall", cmd: "npm uninstall [package]",
                desc: "Safely removes a dependency you no longer need and cleans up your project manifest automatically."
            },
            {
                category: "dependencies", isSimple: true,
                spelled: "Node package manager init", cmd: "npm init",
                desc: "Scaffolds a fresh package.json for your project—the first step before installing any dependencies."
            },

            // --- DEV SERVER ---
            {
                category: "server", isSimple: true,
                spelled: "Node package manager run dev", cmd: "npm run dev",
                desc: "Launches a local web server so you can view, test, and interact with the interface directly in your browser."
            },
            {

        function highlightSpelled(spelled, cmd) {
            const chars = [...cmd.toLowerCase()];
            let ci = 0;
            let html = "";
            for (const ch of spelled) {
                if (ci < chars.length && ch.toLowerCase() === chars[ci]) {
                    ci++;
                    html += `<span>${ch}</span>`;
                } else {
                    html += ch;
                }
            }
            return html;
        }

        const outputDiv = document.getElementById('glossaryOutput');
        const recentSection = document.getElementById('recentSection');
        const searchInput = document.getElementById('glossarySearch');
        const noResultsMessage = document.getElementById('noResultsMessage');

        // Clipboard Copy Handler Function
        function handleCopy(badge, commandText) {
            // Standardize output to clean strings (stripping example helper enclosures like brackets)
            let cleanCmd = commandText;
            if (cleanCmd.includes('[folder-name]')) cleanCmd = cleanCmd.replace('[folder-name]', '');
            if (cleanCmd.includes('[file-name]')) cleanCmd = cleanCmd.replace('[file-name]', '');
            if (cleanCmd.includes('[package]')) cleanCmd = cleanCmd.replace('[package]', '');
            if (cleanCmd.includes('[branch-name]')) cleanCmd = cleanCmd.replace('[branch-name]', '');
            if (cleanCmd.includes('[msg]')) cleanCmd = cleanCmd.replace('-m "[msg]"', '');
            if (cleanCmd.includes('[source] [destination]')) cleanCmd = cleanCmd.split(' ')[0];
            // Strip any remaining bracketed placeholders
            cleanCmd = cleanCmd.replace(/\[.*?\]/g, '').replace(/\s+/g, ' ').trim();

            
            cleanCmd = cleanCmd.trim();

            navigator.clipboard.writeText(cleanCmd).then(() => {
                badge.classList.add('copied');
                badge.textContent = "copied!";
                trackRecent(commandText);

                // Let "copied!" finish showing, then quietly refresh Recently Used
                setTimeout(() => {
                    badge.classList.remove('copied');
                    badge.textContent = commandText;
                    renderGlossary(searchInput.value.toLowerCase().trim(), false);
                }, 800);
            }).catch(err => {
                console.error('Failed to copy to clipboard: ', err);
            });
        }

        function trackRecent(cmd) {
            let recent = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            recent = recent.filter(c => c !== cmd);
            recent.unshift(cmd);
            if (recent.length > 5) recent = recent.slice(0, 5);
            localStorage.setItem('recentCommands', JSON.stringify(recent));
        }

        function createGlossaryRow(item) {
            const row = document.createElement('div');
            row.className = "glossary-row";

            const nameCell = document.createElement('div');
            nameCell.className = "table-cell cell-name";
            const nameDiv = document.createElement('div');
            nameDiv.className = "def-name";
            nameDiv.innerHTML = highlightSpelled(item.spelled, item.cmd);
            nameCell.appendChild(nameDiv);

            const cmdCell = document.createElement('div');
            cmdCell.className = "table-cell cell-command";
            const cmdDiv = document.createElement('div');
            cmdDiv.className = "term-spelled";
            cmdDiv.textContent = item.cmd;
            cmdDiv.title = "Click to copy command";
            cmdDiv.addEventListener('click', () => handleCopy(cmdDiv, item.cmd));
            cmdCell.appendChild(cmdDiv);

            const descCell = document.createElement('div');
            descCell.className = "table-cell cell-desc";
            const descDiv = document.createElement('div');
            descDiv.className = "def-desc";
            descDiv.textContent = item.desc;
            descCell.appendChild(descDiv);

            if (item.isWarning) {
                const banner = document.createElement('div');
                banner.className = "alert-banner";
                const icon = document.createElement('i');
                icon.className = "ph-fill ph-warning alert-icon";
                const text = document.createElement('p');
                text.className = "alert-text";
                text.innerHTML = item.warningMsg.replace(/^(Extreme )?Caution:/, '<span class="font-bold">$&</span>');
                banner.appendChild(icon);
                banner.appendChild(text);
                descCell.appendChild(banner);
            }

            row.appendChild(nameCell);
            row.appendChild(cmdCell);
            row.appendChild(descCell);
            return row;
        }

        function renderGlossary(searchQuery = "", animate = true) {
            const isSearching = searchQuery.length > 0;
            outputDiv.classList.toggle('no-anim', !animate);
            outputDiv.innerHTML = "";
            recentSection.innerHTML = "";

            // Render recent commands if any
            const recent = JSON.parse(localStorage.getItem('recentCommands') || '[]');
            if (recent.length > 0 && !isSearching) {
                const recentTitle = document.createElement('h2');
                recentTitle.className = "section-title";
                recentTitle.textContent = "Recently Used";

                const recentHr = document.createElement('hr');

                recentSection.appendChild(recentTitle);
                recentSection.appendChild(recentHr);

                const recentTable = document.createElement('div');
                recentTable.className = "glossary-table";

                recent.forEach(cmd => {
                    const item = commandLibrary.find(c => c.cmd === cmd);
                    if (!item) return;
                    recentTable.appendChild(createGlossaryRow(item));
                });

                recentSection.appendChild(recentTable);
            }

            let totalMatches = 0;

            for (const [catKey, catTitle] of Object.entries(categories)) {
                
                const matchedItems = commandLibrary.filter(item => {
                    if (item.category !== catKey) return false;
                    
                    if (!isSearching) {
                        return item.isSimple;
                    } else {
                        const rawSpelledClean = item.spelled.replace(/<[^>]*>/g, '').toLowerCase();
                        const cmdClean = item.cmd.toLowerCase();
                        const descClean = item.desc.toLowerCase();
                        
                        return (rawSpelledClean.includes(searchQuery) || 
                                cmdClean.includes(searchQuery) || 
                                descClean.includes(searchQuery));
                    }
                });

                if (matchedItems.length > 0) {
                    totalMatches += matchedItems.length;

                    const sectionWrap = document.createElement('div');
                    sectionWrap.className = "glossary-section";

                    const titleEl = document.createElement('h2');
                    titleEl.className = "section-title";
                    titleEl.textContent = catTitle;

                    const hrEl = document.createElement('hr');

                    sectionWrap.appendChild(titleEl);
                    sectionWrap.appendChild(hrEl);

                    const tableWrap = document.createElement('div');
                    tableWrap.className = "glossary-table";

                    matchedItems.forEach(item => {
                        tableWrap.appendChild(createGlossaryRow(item));
                    });

                    sectionWrap.appendChild(tableWrap);
                    outputDiv.appendChild(sectionWrap);
                }
            }

            if (totalMatches === 0 && isSearching) {
                noResultsMessage.classList.remove('hidden');
                askAiSection.classList.remove('hidden');
                askAiAnswer.classList.add('hidden');
                askAiInput.value = searchInput.value;
            } else {
                noResultsMessage.classList.add('hidden');
                askAiSection.classList.add('hidden');
            }
        }

        const savedQuery = localStorage.getItem('glossarySearch');
        if (savedQuery) {
            searchInput.value = savedQuery;
        }
        renderGlossary(savedQuery || '');

        searchInput.addEventListener('focus', function() {
            this.select();
        });

        const searchClear = document.getElementById('searchClear');

        function updateClear() {
            searchClear.classList.toggle('hidden', !searchInput.value);
        }

        searchInput.addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            localStorage.setItem('glossarySearch', query);
            renderGlossary(query);
            updateClear();
        });

        searchClear.addEventListener('click', function() {
            searchInput.value = '';
            searchInput.focus();
            localStorage.setItem('glossarySearch', '');
            renderGlossary('');
            updateClear();
        });

        updateClear();

        const askAiInput = document.getElementById('askAiInput');
        const askAiButton = document.getElementById('askAiButton');
        const askAiAnswer = document.getElementById('askAiAnswer');

        function renderMarkdown(text) {
            let html = text
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            // Extract code blocks first, replace inline, then restore
            const blocks = [];
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(m) {
                blocks.push('<pre><code>' + m.replace(/^```\w*\n?/, '').replace(/```$/, '') + '</code></pre>');
                return '\x00CODEBLOCK' + (blocks.length - 1) + '\x00';
            });
            html = html
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.+?)\*/g, '<em>$1</em>')
                .replace(/^- (.+)$/gm, '• $1');
            html = html.split('\n\n').map(b => {
                const t = b.trim();
                return t ? '<p>' + t.replace(/\n/g, '<br>') + '</p>' : '';
            }).join('');
            html = html.replace(/\x00CODEBLOCK(\d+)\x00/g, function(_, n) { return blocks[+n]; });
            return html;
        }

        async function askAi() {
            const question = askAiInput.value.trim();
            if (!question) return;

            noResultsMessage.classList.add('hidden');

            askAiButton.disabled = true;
            askAiButton.textContent = "Asking...";
            askAiAnswer.classList.remove('hidden');
            askAiAnswer.innerHTML = '<p><em>Thinking...</em></p>';

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'content-type': 'application/json' },
                    body: JSON.stringify({ question }),
                });
                const data = await res.json();
                askAiAnswer.innerHTML = renderMarkdown(data.answer || "Sorry, I couldn't find an answer.");
            } catch {
                askAiAnswer.innerHTML = '<p>Error connecting to AI. Try again.</p>';
            }

            askAiAnswer.querySelectorAll('code').forEach(el => {
                el.title = "Click to copy";
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const text = this.textContent;
                    navigator.clipboard.writeText(text).then(() => {
                        this.classList.add('copied');
                        this.dataset.orig = this.dataset.orig || text;
                        this.textContent = "copied!";
                        setTimeout(() => {
                            this.classList.remove('copied');
                            this.textContent = this.dataset.orig;
                            delete this.dataset.orig;
                        }, 600);
                    });
                });
            });

            askAiButton.disabled = false;
            askAiButton.textContent = "Ask";
        }

        askAiButton.addEventListener('click', askAi);
        askAiInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') askAi();
        });

        // Bookmark hint — browsers don't allow adding bookmarks via JS,
        // so show the keyboard shortcut for the user's platform.
        const bookmarkBtn = document.getElementById('bookmarkBtn');
        const bookmarkHint = document.getElementById('bookmarkHint');
        let bookmarkHintTimer;

        bookmarkBtn.addEventListener('click', function() {
            const isMac = /Mac|iPhone|iPad/.test(navigator.platform);
            bookmarkHint.textContent = isMac ? "Press ⌘ D to bookmark" : "Press Ctrl + D to bookmark";
            bookmarkHint.classList.add('show');
            clearTimeout(bookmarkHintTimer);
            bookmarkHintTimer = setTimeout(() => bookmarkHint.classList.remove('show'), 2500);
        });
    </script>
